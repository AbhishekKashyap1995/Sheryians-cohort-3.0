<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Squid Game - Landing Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-text-game">GAME</div>
    <div class="bg-text-squid">SQUID</div>

    <div class="container">
      <header class="navbar">
        <div class="logo">
          <h2>
            SQUID <br />
            GAME
          </h2>
        </div>

        <nav class="nav-links">
          <a href="#">About</a>
          <a href="#" class="active">Watch now</a>
          <a href="#">Actors</a>
          <a href="#">Contact</a>
        </nav>

        <div class="menu-icon">
          <i class="fa-solid fa-bars-staggered"></i>
        </div>
      </header>

      <main class="hero">
        <div class="hero-content">
          <div class="main-title">
            <img
              src="./assests/squid game.jpg"
              alt="Squid Game Logo"
              class="title-image"
            />
          </div>

          <p class="description">
            Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br />
            Season 1: 9 Episodes
          </p>

          <div class="action-buttons">
            <button class="btn btn-primary">
              <i class="fa-solid fa-circle-play"></i> Play Now
            </button>
            <button class="btn btn-secondary">
              <i class="fa-solid fa-angle-right"></i> Watch Trailer
            </button>
          </div>
        </div>

        <div class="scroll-indicator">
          <span class="scroll-text">SCROLL</span>
          <div class="scroll-line"></div>
        </div>

        <div class="social-icons">
          <a href="#"><i class="fa-brands fa-twitter"></i></a>
          <a href="#"><i class="fa-brands fa-instagram"></i></a>
          <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
        </div>
      </main>

      <section class="thumbnail-panel">
        <div class="thumbnail">
          <img src="./assests/squid-game-thumbnail-1.jpg" alt="Thumbnail 1" />
          <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="thumbnail">
          <img src="./assests/squid-game-thumbnail-2.jpg" alt="Thumbnail 2" />
          <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="thumbnail">
          <img src="./assests/suid-game-thumbnail-3.jpg" alt="Thumbnail 3" />
          <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
      </section>
    </div>
  </body>
</html>
