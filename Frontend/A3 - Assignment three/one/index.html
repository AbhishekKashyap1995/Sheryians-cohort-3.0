<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explore Art Work</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="dashboard">
      <header class="header">
        <h2>Explore Art Work</h2>
        <a href="#" class="see-all">See All</a>
      </header>

      <main class="art-grid">
        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/monocular.jpg" alt="Monocular" />
          </div>
          <div class="info-row">
            <span class="title">Monocular</span>
            <span class="likes">54.3k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/hornsmask.jpg" alt="Horns Mask" />
          </div>
          <div class="info-row">
            <span class="title">Horns Mask</span>
            <span class="likes">62.4k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/lightmoon.jpg" alt="Light Moon" />
          </div>
          <div class="info-row">
            <span class="title">Light Moon</span>
            <span class="likes">66.6k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/skullwire.jpg" alt="Skull Wire" />
          </div>
          <div class="info-row">
            <span class="title">Skull Wire</span>
            <span class="likes">25.9k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/spiderman.jpg" alt="Spiderman" />
          </div>
          <div class="info-row">
            <span class="title">Spiderman</span>
            <span class="likes">24.5k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn active">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/deadpool.jpg" alt="DeedPool" />
          </div>
          <div class="info-row">
            <span class="title">DeedPool</span>
            <span class="likes">53.7k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/whiteeye.jpg" alt="White Eye" />
          </div>
          <div class="info-row">
            <span class="title">White Eye</span>
            <span class="likes">48.1k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>

        <div class="art-card">
          <div class="img-wrapper">
            <img src="./assests/spinal.jpg" alt="Plastic Spinal" />
          </div>
          <div class="info-row">
            <span class="title">Plastic Spinal</span>
            <span class="likes">56.5k <i class="fa-regular fa-heart"></i></span>
          </div>
          <button class="bid-btn">Place Bid</button>
        </div>
      </main>
    </div>
  </body>
</html>
